<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Babylon Monolith</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --obsidian: #050505; --pearl: #fdfdfd; --dim: #121212; --accent: #d4af37; }
        body { background: var(--obsidian); color: var(--pearl); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; }
        
        .header { padding: 20px 0; border-bottom: 1px solid #222; margin-bottom: 25px; }
        .brand { font-size: 10px; letter-spacing: 5px; color: #666; text-transform: uppercase; }
        
        /* Portfolio Section */
        .equity-box { margin-bottom: 30px; }
        .label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; }
        .amount { font-size: 42px; font-weight: 200; margin: 10px 0; }
        
        /* Pool Stakes */
        .pool-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #1a1a1a; }
        .pool-name { font-size: 14px; font-weight: 500; }
        .pool-percentage { font-size: 12px; color: var(--accent); font-family: monospace; }

        /* Action Buttons */
        .action-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .btn { padding: 15px; border-radius: 4px; border: 1px solid var(--pearl); font-size: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-deposit { background: var(--pearl); color: var(--obsidian); }
        .btn-withdraw { background: transparent; color: var(--pearl); }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">Babylon Inc. / Monolith</div>
    </div>

    <div class="equity-box">
        <div class="label">Total Equity</div>
        <div class="amount" id="total-equity">$0.00</div>
        <div style="font-size: 10px; color: #00ff41;">+0.068% Daily Accrual Active</div>
    </div>

    <div class="label">Your Pro-Rata Stakes</div>
    
    <div class="pool-row">
        <div class="pool-name">Gold Monolith</div>
        <div class="pool-percentage" id="gold-stake">0.000%</div>
    </div>
    <div class="pool-row">
        <div class="pool-name">Platinum Vault</div>
        <div class="pool-percentage" id="platinum-stake">0.000%</div>
    </div>

    <div class="action-container">
        <button class="btn btn-deposit" onclick="triggerHITL('DEPOSIT')">Request Deposit</button>
        <button class="btn btn-withdraw" onclick="triggerHITL('WITHDRAWAL')">Request Payout</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        tg.setHeaderColor('#050505');

        // Initial Data (This will eventually come from your Motoko Canister)
        let userPrincipal = 5000; 
        let poolGoldLiquidity = 21000000;

        function updateDashboard() {
            // Calculate Percentage Stake
            let stake = (userPrincipal / poolGoldLiquidity) * 100;
            document.getElementById('gold-stake').innerText = stake.toFixed(5) + "%";
            document.getElementById('total-equity').innerText = "$" + userPrincipal.toLocaleString();
        }

        function triggerHITL(type) {
            tg.showConfirm(`Initiate Concierge ${type} Request?`, (ok) => {
                if(ok) {
                    tg.sendData(JSON.stringify({
                        protocol: "HITL_GATEWAY",
                        action: type,
                        user: tg.initDataUnsafe.user?.username || "Guest",
                        timestamp: Date.now()
                    }));
                    tg.showAlert(`Admin Handshake Required: Your request for ${type} has been sent to the Babylon Admin Gate for manual verification.`);
                }
            });
        }

        updateDashboard();
    </script>
</body>
</html>
